global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: rs-broker
    static_configs:
      - targets: ["rs-broker:9090"]
        labels:
          service: rs-broker
          mode: both

  - job_name: rs-broker-producer
    static_configs:
      - targets: ["rs-broker-producer:9090"]
        labels:
          service: rs-broker
          mode: producer
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.*)"
        target_label: instance
        replacement: "producer"

  - job_name: rs-broker-consumer
    static_configs:
      - targets: ["rs-broker-consumer:9090"]
        labels:
          service: rs-broker
          mode: consumer
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.*)"
        target_label: instance
        replacement: "consumer"
